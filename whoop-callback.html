<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeOS — Connecting Whoop...</title>
<style>
  body{background:#0a0a0b;color:#f0ede8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;text-align:center;padding:20px}
  .wrap{max-width:340px}
  .logo{font-size:28px;font-weight:800;margin-bottom:24px}
  .logo span{color:#555350}
  .status{font-size:14px;color:#8a8782;margin-bottom:12px;line-height:1.6}
  .ok{color:#2dbd6e;font-size:18px;font-weight:700;margin-bottom:8px}
  .err{color:#e05252;font-size:15px;font-weight:700;margin-bottom:8px}
  .spinner{width:32px;height:32px;border:3px solid #222;border-top-color:#c8ff00;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 20px}
  @keyframes spin{to{transform:rotate(360deg)}}
  a{color:#4a9eff;font-size:13px}
  .detail{font-size:11px;color:#555350;margin-top:10px;font-family:monospace;word-break:break-all}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">trade<span>OS</span></div>
  <div id="ui">
    <div class="spinner"></div>
    <div class="status">Connecting to Whoop...</div>
  </div>
</div>
<script>
var CLIENT_ID    = '5bf50b0e-42d1-4fba-bb75-1e0ddcbdba68';
var CLIENT_SECRET= '2ea95af63c30a70c6d281a2831c8c162b3b11746ad74335b1feed8026e610ebd';
var REDIRECT_URI = 'https://jwmba2015-lab.github.io/tradeos/whoop-callback.html';
var TOKEN_URL    = 'https://api.prod.whoop.com/oauth/oauth2/token';

function show(html) { document.getElementById('ui').innerHTML = html; }

function done() {
  show('<div class="ok">&#10003; Whoop Connected!</div><div class="status">Your recovery, HRV and sleep data will sync automatically.<br><br>Returning to TradeOS...</div>');
  setTimeout(function() { window.location.href = 'https://jwmba2015-lab.github.io/tradeos/'; }, 2000);
}

function fail(msg, detail) {
  show('<div class="err">&#10005; Connection failed</div>' +
    '<div class="status">' + msg + '</div>' +
    (detail ? '<div class="detail">' + detail + '</div>' : '') +
    '<br><br><a href="https://jwmba2015-lab.github.io/tradeos/">&#8592; Back to TradeOS</a>');
}

// Get all URL params
var params = {};
window.location.search.slice(1).split('&').forEach(function(p) {
  var kv = p.split('=');
  if (kv.length === 2) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]);
});

var code  = params['code'];
var error = params['error'];
var state = params['state'];

if (error) {
  fail(
    'Whoop returned: <strong>' + error + '</strong><br><br>' +
    (error === 'invalid_state'
      ? 'This is a Safari cookie/privacy issue. Please try:<br>1. Use Chrome or Firefox instead<br>2. Or in Safari: Settings &#8594; Privacy &#8594; uncheck "Prevent cross-site tracking", try again, then re-enable it'
      : 'Please go back and try connecting again.'),
    params['error_description'] || ''
  );
} else if (!code) {
  fail('No authorization code received. Please try again.');
} else {
  // Exchange code for tokens
  var body = [
    'grant_type=authorization_code',
    'code=' + encodeURIComponent(code),
    'client_id=' + encodeURIComponent(CLIENT_ID),
    'client_secret=' + encodeURIComponent(CLIENT_SECRET),
    'redirect_uri=' + encodeURIComponent(REDIRECT_URI)
  ].join('&');

  show('<div class="spinner"></div><div class="status">Almost there — finalizing connection...</div>');

  fetch(TOKEN_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: body
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.access_token) {
      localStorage.setItem('whoop_access_token',  data.access_token);
      localStorage.setItem('whoop_refresh_token', data.refresh_token || '');
      localStorage.setItem('whoop_token_expiry',  String(Date.now() + (data.expires_in || 3600) * 1000));
      done();
    } else {
      fail(
        'Token exchange failed.',
        JSON.stringify(data)
      );
    }
  })
  .catch(function(err) {
    // CORS error - token exchange blocked by browser
    // This means we need to show manual instructions
    fail(
      'Browser security blocked the connection. This is a known limitation with Safari and browser-based OAuth.<br><br>' +
      'Please try opening in <strong>Chrome</strong> instead — it handles this correctly.',
      'Error: ' + err.message
    );
  });
}
</script>
</body>
</html>
