<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeOS — Connecting Whoop...</title>
<style>
  body{background:#0a0a0b;color:#f0ede8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;text-align:center;padding:20px}
  .wrap{max-width:320px}
  .logo{font-size:28px;font-weight:800;margin-bottom:24px}
  .logo span{color:#555350}
  .status{font-size:15px;color:#8a8782;margin-bottom:12px;line-height:1.5}
  .ok{color:#2dbd6e;font-size:18px;font-weight:700;margin-bottom:8px}
  .err{color:#e05252;font-size:15px;font-weight:700;margin-bottom:8px}
  .spinner{width:32px;height:32px;border:3px solid #222;border-top-color:#c8ff00;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 20px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">trade<span>OS</span></div>
  <div id="ui">
    <div class="spinner"></div>
    <div class="status">Connecting to Whoop...</div>
  </div>
</div>
<script>
var CLIENT_ID     = '5bf50b0e-42d1-4fba-bb75-1e0ddcbdba68';
var CLIENT_SECRET = '2ea95af63c30a70c6d281a2831c8c162b3b11746ad74335b1feed8026e610ebd';
var REDIRECT_URI  = 'https://jwmba2015-lab.github.io/tradeos/whoop-callback.html';
var TOKEN_URL     = 'https://api.prod.whoop.com/oauth/oauth2/token';

function show(html) {
  document.getElementById('ui').innerHTML = html;
}

function done(msg) {
  show('<div class="ok">&#10003; Connected!</div><div class="status">' + msg + '</div>');
  setTimeout(function() {
    window.location.href = '/tradeos/';
  }, 1800);
}

function fail(msg) {
  show('<div class="err">&#10005; Connection failed</div><div class="status">' + msg + '</div><br><a href="/tradeos/" style="color:#4a9eff;font-size:13px">Back to TradeOS</a>');
}

// Parse code from URL
var params = new URLSearchParams(window.location.search);
var code   = params.get('code');
var error  = params.get('error');

if (error) {
  fail('Whoop returned an error: ' + error + '. Please try connecting again.');
} else if (!code) {
  fail('No authorization code received. Please try connecting again.');
} else {
  // Exchange code for token
  var body = 'grant_type=authorization_code' +
    '&code=' + encodeURIComponent(code) +
    '&client_id=' + encodeURIComponent(CLIENT_ID) +
    '&client_secret=' + encodeURIComponent(CLIENT_SECRET) +
    '&redirect_uri=' + encodeURIComponent(REDIRECT_URI);

  fetch(TOKEN_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: body
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.access_token) {
      // Store tokens in localStorage
      localStorage.setItem('whoop_access_token',  data.access_token);
      localStorage.setItem('whoop_refresh_token', data.refresh_token || '');
      localStorage.setItem('whoop_token_expiry',  Date.now() + (data.expires_in || 3600) * 1000);
      done('Whoop is now connected. Returning to TradeOS...');
    } else {
      fail('Could not get access token. ' + (data.error_description || data.error || ''));
    }
  })
  .catch(function(err) {
    fail('Network error: ' + err.message);
  });
}
</script>
</body>
</html>
